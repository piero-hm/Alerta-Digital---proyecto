<div class="login-page-wrapper">
  <!-- Central Glow -->
  <div class="central-glow"></div>

  <!-- Register Container -->
  <main class="login-container">
    <div class="login-card">
      <!-- Brand Hero -->
      <div class="text-center mb-4">
        <div class="brand-logo-circle mb-3">
          <span class="material-symbols-outlined security-icon">security</span>
        </div>
        <h1 class="brand-title mb-1">
          CIBERSEGURO<br />HUANCAYO
        </h1>
        <p class="brand-subtitle mx-auto">
          Plataforma de prevención y protección contra estafas digitales para adultos mayores
        </p>
      </div>

      <!-- Register Form -->
      <form (ngSubmit)="onRegister()" class="login-form">
        <!-- Nombre Input -->
        <div class="mb-3">
          <label class="form-label custom-label" for="nombre">
            Nombre completo
          </label>
          <div class="input-group custom-input-group">
            <span class="input-group-text custom-input-icon">
              <span class="material-symbols-outlined">person</span>
            </span>
            <input
              type="text"
              class="form-control custom-input"
              id="nombre"
              name="nombre"
              placeholder="Ingrese su nombre completo"
              required
              [(ngModel)]="nombre"
            />
          </div>
        </div>

        <!-- Email Input -->
        <div class="mb-3">
          <label class="form-label custom-label" for="email">
            Correo electrónico
          </label>
          <div class="input-group custom-input-group">
            <span class="input-group-text custom-input-icon">
              <span class="material-symbols-outlined">mail</span>
            </span>
            <input
              type="email"
              class="form-control custom-input"
              id="email"
              name="email"
              placeholder="Ingrese su correo"
              required
              [(ngModel)]="email"
            />
          </div>
        </div>

        <!-- Password Input -->
        <div class="mb-3">
          <label class="form-label custom-label" for="password">
            Contraseña
          </label>
          <div class="input-group custom-input-group">
            <span class="input-group-text custom-input-icon">
              <span class="material-symbols-outlined">lock</span>
            </span>
            <input
              type="password"
              class="form-control custom-input"
              id="password"
              name="password"
              placeholder="Ingrese su contraseña"
              required
              [(ngModel)]="password"
            />
          </div>
        </div>

        <!-- Confirm Password Input -->
        <div class="mb-3">
          <label class="form-label custom-label" for="confirmPassword">
            Confirmar contraseña
          </label>
          <div class="input-group custom-input-group">
            <span class="input-group-text custom-input-icon">
              <span class="material-symbols-outlined">lock_reset</span>
            </span>
            <input
              type="password"
              class="form-control custom-input"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Confirme su contraseña"
              required
              [(ngModel)]="confirmPassword"
            />
          </div>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="alert alert-danger mt-3" role="alert">
          {{ errorMessage }}
        </div>

        <!-- Success Message -->
        <div *ngIf="successMessage" class="alert alert-success mt-3" role="alert">
          {{ successMessage }}
        </div>

        <!-- Submit Button -->
        <div class="pt-3">
          <button type="submit" class="btn custom-login-btn">
            <span class="material-symbols-outlined">person_add</span>
            Registrarse
          </button>
        </div>
      </form>

      <!-- Footer Links -->
      <div class="login-footer-links mt-4 pt-3 text-center">
        <p class="mb-0 custom-footer-text">
          ¿Ya tienes una cuenta?
          <a class="custom-footer-link" routerLink="/login">Iniciar sesión</a>
        </p>
        <div class="d-flex align-items-center justify-content-center gap-2 mt-3 custom-footer-info">
          <span class="material-symbols-outlined">verified_user</span>
          <span>Región Junín - Plataforma Segura</span>
        </div>
      </div>
    </div>
  </main>
</div>
